name: Publish to PyPI

# Publishes to PyPI via Trusted Publishing (OIDC) — no API token/secret needed.
# Fires when you publish a GitHub Release. Bump the version in pyproject.toml
# (and server.json) first, then create the release.
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi          # matches the PyPI publisher "Environment name"
    permissions:
      id-token: write          # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
