version: 2
# Weekly, grouped dependency updates to keep PR noise low.
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "14:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "14:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
